<!DOCTYPE html>
<html>
<head>
    <title>Video Library</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .video-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .video-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            padding-bottom: 10px;
        }

        .thumbnail {
            width: 100%;
            height: 150px;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-card h3 {
            padding: 0 10px;
        }

        button {
            margin-left: 10px;
            padding: 8px 15px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        @media(max-width:800px){
            .video-list {
                grid-template-columns: repeat(2,1fr);
            }
        }
    </style>
</head>

<body>

<h1>🎬 Kho Video</h1>

<div class="video-list">

<script>
for(let i = 1; i <= 10; i++){
    document.write(`
    <div class="video-card">
        <div class="thumbnail">
            Video ${i}
        </div>

        <h3>Video số ${i}</h3>

        <button onclick="watch(${i})">
            Xem
        </button>
    </div>
    `);
}

function watch(id){
    alert("Đang mở video " + id);
}
</script>

</div>

</body>
</html>
