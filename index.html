<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba666</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* --- Giai đoạn 1: Ảnh Ponos xuất hiện lập tức khi vào trang --- */
        #ponosImage {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            
            /* Chạy hiệu ứng mờ rõ dần ngay khi load trang */
            opacity: 0; 
            animation: fadeInPonos 6s ease-in-out forwards; 
        }

        @keyframes fadeInPonos {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Giai đoạn 2: Giao diện Loading xuất hiện sau --- */
        #loadingWrapper {
            display: none;
            width: 80%;
            max-width: 500px;
            flex-direction: column;
            align-items: center;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #222222;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #FFFF00;
        }

        .start-loading {
            animation: fillProgress 4s linear forwards;
        }

        @keyframes fillProgress {
            to { width: 100%; }
        }

        .loading-status {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 14px;
        }

        .squares { display: flex; gap: 4px; }
        .sq {
            width: 8px;
            height: 8px;
            background: #333333;
            animation: blink 1.2s infinite ease-in-out;
        }
        .sq:nth-child(1) { animation-delay: 0s; }
        .sq:nth-child(2) { animation-delay: 0.15s; }
        .sq:nth-child(3) { animation-delay: 0.3s; }
        .sq:nth-child(4) { animation-delay: 0.45s; }
        .sq:nth-child(5) { animation-delay: 0.6s; }
        .sq:nth-child(6) { animation-delay: 0.75s; }

        @keyframes blink {
            0%, 100% { background: #333333; }
            50% { background: #ffffff; }
        }
    </style>
</head>
<body>

    <img id="ponosImage" src="red-skull-grim-reaper-illustration_43623-1641.jpg" alt="Ponos">

    <div id="loadingWrapper">
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="fillBar"></div>
        </div>
        <div class="loading-status">
            <span>Loading</span>
            <div class="squares">
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
            </div>
        </div>
    </div>

    <audio id="introAudio" src="gd_salman-tension-stinger-ambience-355381.mp3"></audio>

<script>
const ponosImg = document.getElementById('ponosImage');
const loadingBox = document.getElementById('loadingWrapper');
const fillBar = document.getElementById('fillBar');
const introAudio = document.getElementById('introAudio');
const introAudio = document.getElementById("introAudio");

// Sau 1 giây thì phát âm thanh
setTimeout(() => {
    introAudio.play().catch(err => console.log(err));
}, 1000);
// Tự động kích hoạt đếm giờ chuyển cảnh ngay khi vào trang
setTimeout(() => {
    ponosImg.style.display = 'none';
    loadingBox.style.display = 'flex';
    fillBar.classList.add('start-loading');

    // Chuyển sang trang lobby sau 4 giây loading kết thúc
    setTimeout(() => {
        window.location.href = "lobby.html";
    }, 4000);

}, 8000); // 6 giây mờ rõ + 2 giây lưu ảnh

// Lắng nghe thao tác click bất kỳ của người dùng để bật tiếng lên
document.body.addEventListener('click', () => {
    if (introAudio.muted) {
        introAudio.muted = false; // Bật âm thanh lên
        // Nếu âm thanh lỡ bị dừng do chính sách cũ, lệnh này sẽ ép nó chạy tiếp
        introAudio.play().catch(err => console.log(err)); 
    }
}, { once: true }); // Thuộc tính { once: true } giúp sự kiện này chỉ chạy duy nhất 1 lần đầu tiên
</script>
</body>
</html>
