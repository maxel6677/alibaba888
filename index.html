<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Cat - Battle Cats Edition</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7);
            background-color: #4ec0ca;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- HỆ THỐNG ÂM THANH (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration) {
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}
const sounds = {
    jump: () => playTone(450, "triangle", 0.08), // Tiếng kêu nghe "soft" hơn hợp với mèo
    score: () => { playTone(550, "sine", 0.08); setTimeout(() => playTone(850, "sine", 0.12), 60); },
    hit: () => playTone(120, "sawtooth", 0.25)
};

// --- CẤU HÌNH GAME ---
const GRAVITY = 0.24;
const JUMP = -5.0;
const PIPE_SPEED = 2.2;
const PIPE_GAP = 140; // Nới rộng một chút cho mèo dễ bay
const PIPE_SPAWN_RATE = 90;
const PIPE_WIDTH = 65;

// --- TRẠNG THÁI GAME ---
let gameState = "START"; 
let score = 0;
let highScore = Number(localStorage.getItem("fb_highScore")) || 0; 
let frameCount = 0;
let bgX = 0;
let pipes = [];

let cat = {
    x: 80,
    y: 250,
    radius: 15, // Tăng nhẹ kích thước cho mèo tròn trịa béo ú
    velocity: 0,
    angle: 0
};

// --- SỰ KIỆN ĐIỀU KHIỂN ---
function handleAction(e) {
    if (e) e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (gameState === "START") {
        gameState = "PLAYING";
        cat.velocity = JUMP;
        sounds.jump();
    } else if (gameState === "PLAYING") {
        cat.velocity = JUMP;
        sounds.jump();
    } else if (gameState === "GAMEOVER") {
        resetGame();
        gameState = "PLAYING";
    }
}

document.addEventListener("keydown", (e) => { if (e.code === "Space" || e.code === "ArrowUp") handleAction(); });
canvas.addEventListener("mousedown", handleAction);
canvas.addEventListener("touchstart", handleAction, { passive: false });

function resetGame() {
    cat = {
        x: 80,
        y: 250,
        radius: 15,
        velocity: 0,
        angle: 0
    };
    pipes = [];
    score = 0;
    frameCount = 0;
}

// --- THUẬT TOÁN VA CHẠM CHUẨN ---
function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
    let closestX = Math.max(rx, Math.min(cx, rx + rw));
    let closestY = Math.max(ry, Math.min(cy, ry + rh));

    let dx = cx - closestX;
    let dy = cy - closestY;

    return (dx * dx + dy * dy) < (r * r);
}

// --- VÒNG LẶP CHÍNH ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// --- XỬ LÝ LOGIC ---
function update() {
    if (gameState !== "PLAYING") return;

    bgX -= 0.6;
    if (bgX <= -canvas.width) bgX = 0;

    cat.velocity += GRAVITY;
    cat.y += cat.velocity;
    
    // Mèo The Battle Cats bay kiểu tinh nghịch nên giảm bớt góc chúi đầu sâu
    cat.angle = Math.min(Math.PI / 4, Math.max(-Math.PI / 8, cat.velocity * 0.06));

    if (cat.y + cat.radius >= canvas.height - 45 || cat.y - cat.radius <= 0) {
        triggerGameOver();
    }

    frameCount++;
    if (frameCount % PIPE_SPAWN_RATE === 0) {
        let topHeight = Math.floor(Math.random() * (canvas.height - PIPE_GAP - 160)) + 60;
        pipes.push({
            x: canvas.width,
            topHeight: topHeight,
            scored: false
        });
    }

    for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        p.x -= PIPE_SPEED;

        let hitTop = circleRectCollision(cat.x, cat.y, cat.radius, p.x, 0, PIPE_WIDTH, p.topHeight);
        let hitBottom = circleRectCollision(cat.x, cat.y, cat.radius, p.x, p.topHeight + PIPE_GAP, PIPE_WIDTH, canvas.height - (p.topHeight + PIPE_GAP));

        if (hitTop || hitBottom) {
            triggerGameOver();
        }

        if (!p.scored && p.x + PIPE_WIDTH < cat.x - cat.radius) {
            score++;
            p.scored = true;
            sounds.score();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("fb_highScore", highScore);
            }
        }
    }

    pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
}

function triggerGameOver() {
    gameState = "GAMEOVER";
    sounds.hit();
}

// --- ĐỒ HỌA (VẼ MÈO THE BATTLE CATS) ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Vẽ bầu trời & Nền thành phố
    ctx.fillStyle = "#4ec0ca"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#3caab5";
    for (let j = 0; j < 2; j++) {
        let currentBgX = bgX + (j * canvas.width);
        ctx.fillRect(currentBgX + 10, canvas.height - 180, 50, 135);
        ctx.fillRect(currentBgX + 80, canvas.height - 220, 70, 175);
        ctx.fillRect(currentBgX + 180, canvas.height - 160, 60, 115);
        ctx.fillRect(currentBgX + 270, canvas.height - 240, 80, 195);
    }

    // 2. Vẽ Ống nước
    for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        ctx.fillStyle = "#73bf2e";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;

        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
        ctx.strokeRect(p.x, -5, PIPE_WIDTH, p.topHeight + 5);
        ctx.fillStyle = "#98e342"; 
        ctx.fillRect(p.x + 5, 0, 10, p.topHeight);
        
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(p.x - 4, p.topHeight - 24, PIPE_WIDTH + 8, 24);
        ctx.strokeRect(p.x - 4, p.topHeight - 24, PIPE_WIDTH + 8, 24);

        let bY = p.topHeight + PIPE_GAP;
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(p.x, bY, PIPE_WIDTH, canvas.height - bY);
        ctx.strokeRect(p.x, bY, PIPE_WIDTH, canvas.height - bY + 5);
        
        ctx.fillRect(p.x - 4, bY, PIPE_WIDTH + 8, 24);
        ctx.strokeRect(p.x - 4, bY, PIPE_WIDTH + 8, 24);
    }

    // 3. Vẽ Mặt Đất
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0, canvas.height - 45, canvas.width, 45);
    ctx.fillStyle = "#54b031"; 
    ctx.fillRect(0, canvas.height - 45, canvas.width, 12);
    ctx.fillStyle = "#000";
    ctx.fillRect(0, canvas.height - 45, canvas.width, 3);

    // 4. VẼ MÈO BATTLE CATS (Vẽ tay vector chi tiết)
    ctx.save();
    ctx.translate(cat.x, cat.y);
    ctx.rotate(cat.angle);
    
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = "#000";
    ctx.lineCap = "round";

    // --- Vẽ Tai Mèo (Vẽ trước để thân đè lên chân tai) ---
    ctx.fillStyle = "#fbfbf6"; // Màu trắng sữa nguyên bản của Mèo Battle Cat
    // Tai Trái
    ctx.beginPath();
    ctx.moveTo(-11, -9);
    ctx.lineTo(-13, -21);
    ctx.lineTo(-3, -14);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Tai Phải
    ctx.beginPath();
    ctx.moveTo(3, -14);
    ctx.lineTo(7, -21);
    ctx.lineTo(11, -9);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // --- Thân Mèo (Tròn xoe) ---
    ctx.fillStyle = "#fbfbf6";
    ctx.beginPath();
    ctx.arc(0, 0, cat.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // --- Khuôn mặt đặc trưng của The Battle Cats (='-'=) ---
    // Mắt híp trái (Đoạn thẳng chéo nhỏ)
    ctx.beginPath();
    ctx.moveTo(1, -3);
    ctx.lineTo(4, -1);
    ctx.stroke();
    
    // Mắt híp phải
    ctx.beginPath();
    ctx.moveTo(9, -3);
    ctx.lineTo(6, -1);
    ctx.stroke();

    // Mũi/Miệng râu (Dấu gạch ngang đơ đơ tinh nghịch)
    ctx.beginPath();
    ctx.moveTo(4, 2);
    ctx.lineTo(6, 2);
    ctx.stroke();

    // --- Chân Mèo (2 đốm nhỏ lúc lắc theo frameCount) ---
    ctx.fillStyle = "#fbfbf6";
    let legOffset = Math.sin(frameCount * 0.5) * 2;
    // Chân trước
    ctx.beginPath();
    ctx.arc(-5, cat.radius - 1 + legOffset, 4, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Chân sau
    ctx.beginPath();
    ctx.arc(4, cat.radius - 1 - legOffset, 4, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();

    ctx.restore();

    // 5. Hệ thống UI Text
    function drawShadowText(text, x, y, font, color = "#fff") {
        ctx.font = font;
        ctx.textAlign = "center";
        ctx.fillStyle = "#000"; 
        ctx.fillText(text, x + 3, y + 3);
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }

    if (gameState === "PLAYING") {
        drawShadowText(score, canvas.width / 2, 70, "bold 45px 'Courier New'");
    }

    if (gameState === "START") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawShadowText("FLAPPY CAT", canvas.width / 2, 200, "bold 42px 'Courier New'", "#fff");
        drawShadowText("BATTLE CATS EDITION", canvas.width / 2, 240, "bold 18px 'Courier New'", "#f1c40f");
        drawShadowText("CHẠM ĐỂ BAY", canvas.width / 2, 330, "bold 20px 'Courier New'");
        drawShadowText("KỶ LỤC: " + highScore, canvas.width / 2, 450, "bold 22px 'Courier New'", "#e74c3c");
    }

    if (gameState === "GAMEOVER") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fbfbf6";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 4;
        ctx.fillRect(60, 180, 280, 160);
        ctx.strokeRect(60, 180, 280, 160);

        drawShadowText("MEOW OVER!", canvas.width / 2, 230, "bold 30px 'Courier New'", "#e74c3c");
        drawShadowText("ĐIỂM SỐ: " + score, canvas.width / 2, 275, "bold 20px 'Courier New'", "#333");
        drawShadowText("KỶ LỤC: " + highScore, canvas.width / 2, 305, "bold 20px 'Courier New'", "#333");

        drawShadowText("CHẠM ĐỂ CHƠI LẠI", canvas.width / 2, 400, "bold 18px 'Courier New'");
    }
}

// Khởi chạy game loop
gameLoop();
</script>

</body>
</html>
