<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Minimal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        canvas {
            width: min(100vw, 400px);
            height: auto;
            aspect-ratio: 400 / 600;
            border: 4px solid #333;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7);
            background-color: #4ec0ca;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- RESPONSIVE ---
function resizeCanvas(){
    let scale = Math.min(window.innerWidth / 400, window.innerHeight / 600);
    canvas.style.width = (400 * scale) + "px";
    canvas.style.height = (600 * scale) + "px";
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// --- CẤU HÌNH GAME CHUẨN ---
const GRAVITY = 0.24;
const JUMP = -5.0;
const PIPE_SPEED = 2.2;
const PIPE_GAP = 140; 
const PIPE_SPAWN_RATE = 90;
const PIPE_WIDTH = 65;

let gameState = "MAIN_MENU"; // MAIN_MENU, PLAYING, GAMEOVER
let score = 0;
let highScore = 0;
let frameCount = 0;
let bgX = 0;
let pipes = [];
let bird = { x: 80, y: 250, radius: 13, velocity: 0, angle: 0 };

// --- XỬ LÝ TƯƠNG TÁC CHẠM CHUẨN ---
function handleInteraction() {
    if (gameState === "MAIN_MENU") {
        resetGame();
        gameState = "PLAYING";
    } else if (gameState === "PLAYING") {
        bird.velocity = JUMP;
    } else if (gameState === "GAMEOVER") {
        gameState = "MAIN_MENU";
    }
}

canvas.addEventListener("mousedown", handleInteraction);
canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    handleInteraction();
}, { passive: false });

document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        handleInteraction();
    }
});

function resetGame() {
    bird = { x: 80, y: 250, radius: 13, velocity: 0, angle: 0 };
    pipes = [];
    score = 0;
    frameCount = 0;
}

function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
    let closestX = Math.max(rx, Math.min(cx, rx + rw));
    let closestY = Math.max(ry, Math.min(cy, ry + rh));
    let dx = cx - closestX;
    let dy = cy - closestY;
    return (dx * dx + dy * dy) < (r * r);
}

// --- VÒNG LẶP CHÍNH ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    // Cuộn nền liên tục kể cả ở Menu
    bgX -= 0.6;
    if (bgX <= -canvas.width) bgX = 0;

    if (gameState !== "PLAYING") return;

    bird.velocity += GRAVITY;
    bird.y += bird.velocity;
    bird.angle = Math.min(Math.PI / 3, Math.max(-Math.PI / 7, bird.velocity * 0.09));

    // Va chạm biên dọc
    if (bird.y + bird.radius >= canvas.height - 45 || bird.y - bird.radius <= 0) {
        gameState = "GAMEOVER";
    }

    // Tạo ống cống
    frameCount++;
    if (frameCount % PIPE_SPAWN_RATE === 0) {
        let topHeight = Math.floor(Math.random() * (canvas.height - PIPE_GAP - 160)) + 60;
        pipes.push({ x: canvas.width, topHeight: topHeight, scored: false });
    }

    // Di chuyển và kiểm tra ống
    for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        p.x -= PIPE_SPEED;

        let hitTop = circleRectCollision(bird.x, bird.y, bird.radius, p.x, 0, PIPE_WIDTH, p.topHeight);
        let hitBottom = circleRectCollision(bird.x, bird.y, bird.radius, p.x, p.topHeight + PIPE_GAP, PIPE_WIDTH, canvas.height - (p.topHeight + PIPE_GAP));

        if (hitTop || hitBottom) {
            gameState = "GAMEOVER";
        }

        if (!p.scored && p.x + PIPE_WIDTH < bird.x - bird.radius) {
            score++;
            p.scored = true;
            if (score > highScore) highScore = score;
        }
    }
    pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Nền bầu trời
    ctx.fillStyle = "#4ec0ca";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 2. Nền thành phố phía xa
    ctx.fillStyle = "#3caab5";
    for (let j = 0; j < 3; j++) {
        let currentBgX = bgX + (j * canvas.width);
        ctx.fillRect(currentBgX + 10, canvas.height - 180, 50, 135);
        ctx.fillRect(currentBgX + 80, canvas.height - 220, 70, 175);
        ctx.fillRect(currentBgX + 180, canvas.height - 160, 60, 115);
    }

    // 3. Ống cống xanh lá
    for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        ctx.fillStyle = "#73bf2e";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        
        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
        ctx.strokeRect(p.x, -5, PIPE_WIDTH, p.topHeight + 5);
        
        let bY = p.topHeight + PIPE_GAP;
        ctx.fillRect(p.x, bY, PIPE_WIDTH, canvas.height - bY);
        ctx.strokeRect(p.x, bY, PIPE_WIDTH, canvas.height - bY + 5);
    }

    // 4. Mặt đất
    ctx.fillStyle = "#ded895"; ctx.fillRect(0, canvas.height - 45, canvas.width, 45);
    ctx.fillStyle = "#54b031"; ctx.fillRect(0, canvas.height - 45, canvas.width, 12);
    ctx.fillStyle = "#000"; ctx.fillRect(0, canvas.height - 45, canvas.width, 3);

    // Hàm viết chữ đổ bóng đổ khối nhanh
    function drawText(text, x, y, font, color = "#fff") {
        ctx.font = font; ctx.textAlign = "center"; 
        ctx.fillStyle = "#000"; ctx.fillText(text, x + 2, y + 2);
        ctx.fillStyle = color; ctx.fillText(text, x, y);
    }

    // VẼ CHIM (Dùng hình tròn cơ bản - Tuyệt đối không lỗi hiển thị)
    function drawSimpleBird(x, y, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        
        // Thân
        ctx.fillStyle = "#f1c40f";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        
        // Mắt
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(4, -3, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(5, -3, 1.5, 0, Math.PI * 2); ctx.fill();
        
        // Mỏ
        ctx.fillStyle = "#e67e22";
        ctx.beginPath(); ctx.moveTo(9, 0); ctx.lineTo(16, -3); ctx.lineTo(12, 4); ctx.closePath(); ctx.fill(); ctx.stroke();
        
        ctx.restore();
    }

    // --- RENDER GIAO DIỆN THEO TRẠNG THÁI ---
    if (gameState === "MAIN_MENU") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawText("FLAPPY BIRD", canvas.width / 2, 180, "bold 42px Arial, sans-serif", "#f1c40f");
        drawText("KỶ LỤC: " + highScore, canvas.width / 2, 240, "bold 20px Arial, sans-serif", "#fff");
        
        drawSimpleBird(canvas.width / 2, 300, 0);
        
        // Giả lập nút bấm phẳng bằng chữ vẽ trực tiếp
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(110, 370, 180, 50);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(110, 370, 180, 50);
        drawText("CHẠM ĐỂ CHƠI", canvas.width / 2, 402, "bold 16px Arial, sans-serif", "#fff");
    }
    else if (gameState === "PLAYING") {
        drawSimpleBird(bird.x, bird.y, bird.angle);
        drawText(score, canvas.width / 2, 80, "bold 48px Arial, sans-serif");
    }
    else if (gameState === "GAMEOVER") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#f4f1c3"; ctx.fillRect(70, 200, 260, 160);
        ctx.strokeStyle = "#543805"; ctx.lineWidth = 4; ctx.strokeRect(70, 200, 260, 160);
        
        drawText("THUA CUỘC", canvas.width / 2, 245, "bold 26px Arial, sans-serif", "#e74c3c");
        drawText("ĐIỂM SỐ: " + score, canvas.width / 2, 290, "bold 18px Arial, sans-serif", "#333");
        drawText("KỶ LỤC: " + highScore, canvas.width / 2, 325, "bold 18px Arial, sans-serif", "#333");
        
        drawText("CHẠM BẤT KỲ ĐỂ CHƠI LẠI", canvas.width / 2, 400, "bold 14px Arial, sans-serif");
    }
}

// Khởi động game
gameLoop();
</script>
</body>
</html>
