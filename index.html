<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponos Loading</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Nền đen */
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 1. Ảnh Ponos chính giữa */
        #myImage {
            max-width: 400px;
            margin-bottom: 50px;
        }

        /* 2. Khung chứa thanh loading và chữ */
        #loadingWrapper {
            width: 80%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #f39c12; /* Màu vàng */
            animation: fillProgress 6s linear forwards;
        }

        @keyframes fillProgress {
            to { width: 100%; }
        }

        .loading-status {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 14px;
        }

        /* 3. 6 ô vuông chạy qua lại */
        .squares {
            display: flex;
            gap: 4px;
        }
        .sq {
            width: 8px;
            height: 8px;
            background: #555;
            animation: blink 1s infinite;
        }
        .sq:nth-child(1) { animation-delay: 0.1s; }
        .sq:nth-child(2) { animation-delay: 0.2s; }
        .sq:nth-child(3) { animation-delay: 0.3s; }
        .sq:nth-child(4) { animation-delay: 0.4s; }
        .sq:nth-child(5) { animation-delay: 0.5s; }
        .sq:nth-child(6) { animation-delay: 0.6s; }

        @keyframes blink {
            50% { background: white; }
        }
    </style>
</head>
<body>

    <!-- Logo chính giữa màn hình -->
    <img id="myImage" src="maxresdefault.jpg" alt="Ponos">

    <!-- Thanh loading bên dưới -->
    <div id="loadingWrapper">
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
        <div class="loading-status">
            <span>Loading</span>
            <div class="squares">
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
            </div>
        </div>
    </div>

    <script>
        // Sau 6 giây toàn bộ màn hình sẽ ẩn đi
        setTimeout(() => {
            document.body.innerHTML = ''; 
        }, 6000);
    </script>
</body>
</html>
