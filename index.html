<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba666</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Màn hình xác nhận giao diện đẹp, huyền bí */
        #interactionOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
        }

        .warning-box {
            text-align: center;
            padding: 20px;
        }

        .warning-box h2 {
            font-size: 24px;
            color: #ff3333;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .warning-box p {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .start-btn {
            background: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 35px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px #ffffff;
        }

        /* --- Giai đoạn 1: Ảnh Ponos --- */
        #ponosImage {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0; 
        }

        .fade-in-active {
            animation: fadeInPonos 6s ease-in-out forwards; 
        }

        @keyframes fadeInPonos {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Giai đoạn 2: Loading --- */
        #loadingWrapper {
            display: none;
            width: 80%;
            max-width: 500px;
            flex-direction: column;
            align-items: center;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #222222;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #FFFF00;
        }

        .start-loading {
            animation: fillProgress 4s linear forwards;
        }

        @keyframes fillProgress {
            to { width: 100%; }
        }

        .loading-status {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 14px;
        }

        .squares { display: flex; gap: 4px; }
        .sq {
            width: 8px;
            height: 8px;
            background: #333333;
            animation: blink 1.2s infinite ease-in-out;
        }
        .sq:nth-child(1) { animation-delay: 0s; }
        .sq:nth-child(2) { animation-delay: 0.15s; }
        .sq:nth-child(3) { animation-delay: 0.3s; }
        .sq:nth-child(4) { animation-delay: 0.45s; }
        .sq:nth-child(5) { animation-delay: 0.6s; }
        .sq:nth-child(6) { animation-delay: 0.75s; }

        @keyframes blink {
            0%, 100% { background: #333333; }
            50% { background: #ffffff; }
        }
    </style>
</head>
<body>

    <div id="interactionOverlay">
        <div class="warning-box">
            <h2>CẢNH BÁO ÂM THANH</h2>
            <p>Trò chơi có chứa âm thanh rùng rợn. Vui lòng đeo tai nghe.</p>
            <button class="start-btn" id="btnEnter">VÀO GAME</button>
        </div>
    </div>

    <img id="ponosImage" src="red-skull-grim-reaper-illustration_43623-1641.jpg" alt="Ponos">

    <div id="loadingWrapper">
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="fillBar"></div>
        </div>
        <div class="loading-status">
            <span>Loading</span>
            <div class="squares">
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
            </div>
        </div>
    </div>

    <audio id="introAudio" src="gd_salman-tension-stinger-ambience-355381.mp3"></audio>

<script>
const overlay = document.getElementById('interactionOverlay');
const btnEnter = document.getElementById('btnEnter');
const ponosImg = document.getElementById('ponosImage');
const loadingBox = document.getElementById('loadingWrapper');
const fillBar = document.getElementById('fillBar');
const introAudio = document.getElementById('introAudio');

btnEnter.addEventListener('click', () => {
    // 1. Biến mất màn hình cảnh báo
    overlay.style.display = 'none';

    // 2. Âm thanh được kích hoạt ngay lập tức
    introAudio.play().catch(err => console.log(err));

    // 3. Ảnh bắt đầu mờ rõ trong 6 giây
    ponosImg.classList.add('fade-in-active');

    // 4. Chờ 8 giây (6s rõ + 2s lưu ảnh) đổi sang Loading
    setTimeout(() => {
        ponosImg.style.display = 'none';
        loadingBox.style.display = 'flex';
        fillBar.classList.add('start-loading');

        // Chuyển trang sau 4 giây loading kết thúc
        setTimeout(() => {
            window.location.href = "lobby.html";
        }, 4000);

    }, 8000);
});
</script>
</body>
</html>
