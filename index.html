<!DOCTYPE html>
<html>
<head>
    <title>Kho Video</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .video-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .video-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            padding-bottom: 15px;
        }

        .thumbnail {
            height: 150px;
            background: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .video-card h3 {
            padding-left: 10px;
        }

        button {
            margin-left: 10px;
            padding: 8px 18px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        @media(max-width:800px){
            .video-list {
                grid-template-columns: repeat(2,1fr);
            }
        }
    </style>

</head>

<body>

<h1>🎬 Kho Video</h1>


<div class="video-list" id="videoList"></div>



<script>

let videoList = document.getElementById("videoList");


for(let i = 1; i <= 10; i++){

    videoList.innerHTML += `

    <div class="video-card">

        <div class="thumbnail">
            Video ${i}
        </div>

        <h3>
            Video số ${i}
        </h3>


        <button onclick="watchVideo(${i})">
            Xem
        </button>

    </div>

    `;
}



function watchVideo(id){

    window.location.href = "player.html?id=" + id;

}

</script>


</body>
</html>
