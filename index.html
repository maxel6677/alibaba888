<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Phim Cá Nhân của Tôi</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
        }

        /* Khung nhập liệu */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background: #2e2e2e;
            color: #fff;
            font-size: 16px;
        }

        input:focus {
            outline: 2px solid var(--accent-color);
        }

        button {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #ff6b81;
        }

        /* Danh sách Video */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        @media (max-width: 500px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Tỷ lệ 16:9 */
            height: 0;
            background: #000;
        }

        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background-color: #555;
            padding: 6px 12px;
            font-size: 13px;
        }

        .delete-btn:hover {
            background-color: #e22222;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 Hộp Lưu Trữ Video Cá Nhân</h1>
        
        <div class="input-section">
            <input type="text" id="videoLink" placeholder="Dán link YouTube hoặc link file .mp4 trực tiếp vào đây...">
            <button onclick="addVideo()">Thêm Video</button>
        </div>

        <div class="video-grid" id="videoContainer"></div>
    </div>

    <script>
        // Tự động tải danh sách video cũ từ bộ nhớ trình duyệt khi mở trang
        document.addEventListener("DOMContentLoaded", loadVideos);

        function addVideo() {
            const input = document.getElementById("videoLink");
            const url = input.value.trim();

            if (!url) {
                alert("Vui lòng dán một đường link!");
                return;
            }

            // Lấy danh sách hiện tại từ LocalStorage
            let videoList = JSON.parse(localStorage.getItem("myVideos")) || [];
            
            // Thêm link mới vào danh sách
            videoList.push(url);
            
            // Lưu lại vào LocalStorage
            localStorage.setItem("myVideos", JSON.stringify(videoList));

            // Hiển thị ra màn hình
            renderVideo(url, videoList.length - 1);

            // Xóa text ở ô nhập liệu
            input.value = "";
        }

        function loadVideos() {
            let videoList = JSON.parse(localStorage.getItem("myVideos")) || [];
            videoList.forEach((url, index) => {
                renderVideo(url, index);
            });
        }

        // Hàm xử lý để biến đổi link thành khung xem video (Embed)
        function renderVideo(url, index) {
            const container = document.getElementById("videoContainer");
            let videoElement = "";

            // 1. Xử lý nếu là link YouTube thông thường hoặc dạng rút gọn (youtu.be)
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let videoId = "";
                if (url.includes("youtube.com/watch?v=")) {
                    videoId = url.split("v=")[1].split("&")[0];
                } else if (url.includes("youtu.be/")) {
                    videoId = url.split("youtu.be/")[1].split("?")[0];
                } else if (url.includes("youtube.com/embed/")) {
                    videoId = url.split("embed/")[1].split("?")[0];
                }
                
                videoElement = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
            } 
            // 2. Xử lý nếu là link file video trực tiếp (đuôi .mp4, .webm, .ogg)
            else if (url.match(/\.(mp4|webm|ogg)($|\?)/i) || url.includes("drive.google.com")) {
                videoElement = `<video src="${url}" controls></video>`;
            } 
            // 3. Nếu là link khác không hỗ trợ nhúng thẳng, dùng iframe tạm thời
            else {
                videoElement = `<iframe src="${url}"></iframe>`;
            }

            // Tạo thẻ card chứa video
            const card = document.createElement("div");
            card.className = "video-card";
            card.id = `video-${index}`;
            card.innerHTML = `
                <div class="video-wrapper">
                    ${videoElement}
                </div>
                <div class="video-info">
                    <span style="font-size: 12px; color: #aaa; word-break: break-all;">${url.substring(0, 40)}...</span>
                    <button class="delete-btn" onclick="deleteVideo(${index})">Xóa</button>
                </div>
            `;

            container.appendChild(card);
        }

        // Hàm xóa video
        function deleteVideo(index) {
            let videoList = JSON.parse(localStorage.getItem("myVideos")) || [];
            
            // Xóa phần tử khỏi mảng
            videoList.splice(index, 1);
            
            // Cập nhật lại LocalStorage
            localStorage.setItem("myVideos", JSON.stringify(videoList));
            
            // Tải lại danh sách trên giao diện
            document.getElementById("videoContainer").innerHTML = "";
            loadVideos();
        }
    </script>
</body>
</html>
