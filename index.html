<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Ultimate - Fixed Assets</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7);
            background-color: #4ec0ca;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- HỆ THỐNG ÂM THANH (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration) {
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}
const sounds = {
    jump: () => playTone(400, "square", 0.1),
    score: () => { playTone(600, "sine", 0.08); setTimeout(() => playTone(900, "sine", 0.15), 80); },
    hit: () => playTone(150, "sawtooth", 0.3)
};

// --- CẤU HÌNH GAME ---
const GRAVITY = 0.24;
const JUMP = -5.0;
const PIPE_SPEED = 2.2;
const PIPE_GAP = 135;
const PIPE_SPAWN_RATE = 90;
const PIPE_WIDTH = 65;

// --- TRẠNG THÁI GAME ---
let gameState = "START"; 
let score = 0;
let highScore = Number(localStorage.getItem("fb_highScore")) || 0; 
let frameCount = 0;
let bgX = 0;
let pipes = [];

let bird = {
    x: 80,
    y: 250,
    radius: 13,
    velocity: 0,
    angle: 0
};

// Đã loại bỏ hoàn toàn các biến Image() bị lỗi link link ngoài!

// --- SỰ KIỆN ĐIỀU KHIỂN ---
function handleAction(e) {
    if (e) e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (gameState === "START") {
        gameState = "PLAYING";
        bird.velocity = JUMP;
        sounds.jump();
    } else if (gameState === "PLAYING") {
        bird.velocity = JUMP;
        sounds.jump();
    } else if (gameState === "GAMEOVER") {
        resetGame();
        gameState = "PLAYING";
    }
}

document.addEventListener("keydown", (e) => { if (e.code === "Space" || e.code === "ArrowUp") handleAction(); });
canvas.addEventListener("mousedown", handleAction);
canvas.addEventListener("touchstart", handleAction, { passive: false });

function resetGame() {
    bird = {
        x: 80,
        y: 250,
        radius: 13,
        velocity: 0,
        angle: 0
    };
    pipes = [];
    score = 0;
    frameCount = 0;
}

// --- THUẬT TOÁN VA CHẠM CHUẨN ---
function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
    let closestX = Math.max(rx, Math.min(cx, rx + rw));
    let closestY = Math.max(ry, Math.min(cy, ry + rh));

    let dx = cx - closestX;
    let dy = cy - closestY;

    return (dx * dx + dy * dy) < (r * r);
}

// --- VÒNG LẶP CHÍNH ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// --- XỬ LÝ LOGIC ---
function update() {
    if (gameState !== "PLAYING") return;

    // 1. Cuộn nền thành phố
    bgX -= 0.6;
    if (bgX <= -canvas.width) bgX = 0;

    // 2. Vật lý chim
    bird.velocity += GRAVITY;
    bird.y += bird.velocity;
    bird.angle = Math.min(Math.PI / 3, Math.max(-Math.PI / 7, bird.velocity * 0.09));

    if (bird.y + bird.radius >= canvas.height - 45 || bird.y - bird.radius <= 0) {
        triggerGameOver();
    }

    // 3. Quản lý ống
    frameCount++;
    if (frameCount % PIPE_SPAWN_RATE === 0) {
        let topHeight = Math.floor(Math.random() * (canvas.height - PIPE_GAP - 160)) + 60;
        pipes.push({
            x: canvas.width,
            topHeight: topHeight,
            scored: false
        });
    }

    for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        p.x -= PIPE_SPEED;

        let hitTop = circleRectCollision(bird.x, bird.y, bird.radius, p.x, 0, PIPE_WIDTH, p.topHeight);
        let hitBottom = circleRectCollision(bird.x, bird.y, bird.radius, p.x, p.topHeight + PIPE_GAP, PIPE_WIDTH, canvas.height - (p.topHeight + PIPE_GAP));

        if (hitTop || hitBottom) {
            triggerGameOver();
        }

        if (!p.scored && p.x + PIPE_WIDTH < bird.x - bird.radius) {
            score++;
            p.scored = true;
            sounds.score();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("fb_highScore", highScore);
            }
        }
    }

    pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
}

function triggerGameOver() {
    gameState = "GAMEOVER";
    sounds.hit();
}

// --- ĐỒ HỌA (TỰ VẼ 100% CỰC ĐẸP) ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Vẽ bầu trời & Nền thành phố cuộn tự động bằng hình học
    ctx.fillStyle = "#4ec0ca"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Vẽ các tòa nhà nền (Lặp lại 2 lần để tạo hiệu ứng cuộn vô tận)
    ctx.fillStyle = "#3caab5";
    for (let j = 0; j < 2; j++) {
        let currentBgX = bgX + (j * canvas.width);
        
        // Tòa nhà 1
        ctx.fillRect(currentBgX + 10, canvas.height - 180, 50, 135);
        ctx.fillRect(currentBgX + 25, canvas.height - 195, 20, 15);
        // Tòa nhà 2
        ctx.fillRect(currentBgX + 80, canvas.height - 220, 70, 175);
        // Tòa nhà 3
        ctx.fillRect(currentBgX + 180, canvas.height - 160, 60, 115);
        // Tòa nhà 4
        ctx.fillRect(currentBgX + 270, canvas.height - 240, 80, 195);
    }

    // 2. Vẽ Ống nước phong cách retro
    for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        
        ctx.fillStyle = "#73bf2e";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;

        // Ống trên
        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
        ctx.strokeRect(p.x, -5, PIPE_WIDTH, p.topHeight + 5);
        ctx.fillStyle = "#98e342"; // Sọc sáng tạo khối 3D cho ống
        ctx.fillRect(p.x + 5, 0, 10, p.topHeight);
        
        // Gờ miệng ống trên
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(p.x - 4, p.topHeight - 24, PIPE_WIDTH + 8, 24);
        ctx.strokeRect(p.x - 4, p.topHeight - 24, PIPE_WIDTH + 8, 24);
        ctx.fillStyle = "#98e342";
        ctx.fillRect(p.x + 1, p.topHeight - 21, 10, 18);

        // Ống dưới
        let bY = p.topHeight + PIPE_GAP;
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(p.x, bY, PIPE_WIDTH, canvas.height - bY);
        ctx.strokeRect(p.x, bY, PIPE_WIDTH, canvas.height - bY + 5);
        ctx.fillStyle = "#98e342"; 
        ctx.fillRect(p.x + 5, bY, 10, canvas.height - bY);

        // Gờ miệng ống dưới
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(p.x - 4, bY, PIPE_WIDTH + 8, 24);
        ctx.strokeRect(p.x - 4, bY, PIPE_WIDTH + 8, 24);
        ctx.fillStyle = "#98e342";
        ctx.fillRect(p.x + 1, bY + 3, 10, 18);
    }

    // 3. Vẽ Mặt Đất
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0, canvas.height - 45, canvas.width, 45);
    ctx.fillStyle = "#54b031"; // Cỏ lục
    ctx.fillRect(0, canvas.height - 45, canvas.width, 12);
    ctx.fillStyle = "#000";
    ctx.fillRect(0, canvas.height - 45, canvas.width, 3);

    // 4. Vẽ Chú Chim Tỉ Mỉ (Bản vẽ tay bằng Code Vector sắc nét)
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.angle);
    
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = "#000";

    // Thân tròn (Màu vàng Flappy)
    ctx.fillStyle = "#f1c40f";
    ctx.beginPath();
    ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Cánh chim trắng (Nhấp nháy nhẹ theo thời gian thực)
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    // Di chuyển cánh lên xuống dựa theo frameCount
    let wingWave = Math.sin(frameCount * 0.4) * 3;
    ctx.ellipse(-5, 2, 7, 5 + wingWave/2, Math.PI/6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Mắt to tròn đặc trưng
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(5, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Con ngươi đen
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(6.5, -4, 2, 0, Math.PI * 2);
    ctx.fill();

    // Mỏ cam dày dặn
    ctx.fillStyle = "#e67e22";
    ctx.beginPath();
    ctx.moveTo(11, -3);
    ctx.lineTo(21, 1);
    ctx.lineTo(11, 5);
    ctx.lineTo(8, 1);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Đường rãnh mỏ
    ctx.beginPath();
    ctx.moveTo(10, 1);
    ctx.lineTo(20, 1);
    ctx.stroke();

    ctx.restore();

    // 5. Hệ thống UI Text Đổ Bóng Sắc Nét
    function drawShadowText(text, x, y, font, color = "#fff") {
        ctx.font = font;
        ctx.textAlign = "center";
        ctx.fillStyle = "#000"; 
        ctx.fillText(text, x + 3, y + 3);
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }

    if (gameState === "PLAYING") {
        drawShadowText(score, canvas.width / 2, 70, "bold 45px 'Courier New'");
    }

    // 6. Các màn hình trạng thái
    if (gameState === "START") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawShadowText("FLAPPY BIRD", canvas.width / 2, 200, "bold 42px 'Courier New'", "#f1c40f");
        drawShadowText("CHẠM ĐỂ BẮT ĐẦU", canvas.width / 2, 300, "bold 20px 'Courier New'");
        drawShadowText("KỶ LỤC: " + highScore, canvas.width / 2, 450, "bold 22px 'Courier New'", "#e74c3c");
    }

    if (gameState === "GAMEOVER") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Hộp điểm
        ctx.fillStyle = "#f4f1c3";
        ctx.strokeStyle = "#543805";
        ctx.lineWidth = 4;
        ctx.fillRect(60, 180, 280, 160);
        ctx.strokeRect(60, 180, 280, 160);

        drawShadowText("GAME OVER", canvas.width / 2, 230, "bold 30px 'Courier New'", "#e74c3c");
        drawShadowText("ĐIỂMỐ: " + score, canvas.width / 2, 275, "bold 20px 'Courier New'", "#333");
        drawShadowText("KỶ LỤC: " + highScore, canvas.width / 2, 305, "bold 20px 'Courier New'", "#333");

        drawShadowText("CHẠM ĐỂ CHƠI LẠI", canvas.width / 2, 400, "bold 18px 'Courier New'");
    }
}

// Chạy game loop
gameLoop();
</script>

</body>
</html>
