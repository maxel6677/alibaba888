<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponos Timeline</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Nền đen xuyên suốt */
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* --- Giai đoạn 1: Ảnh Ponos xuất hiện trước --- */
        #ponosImage {
            display: block; /* Hiện đầu tiên */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* --- Giai đoạn 2: Giao diện Loading xuất hiện sau --- */
        #loadingWrapper {
            display: none; /* Lúc đầu ẩn đi */
            width: 80%;
            max-width: 500px;
            flex-direction: column;
            align-items: center;
        }

        /* Thanh chứa - góc vuông hoàn toàn */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #222222;
            border-radius: 0px; /* Góc vuông */
            overflow: hidden;
        }

        /* Thanh chạy màu vàng tươi - góc vuông */
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #FFFF00; /* Màu vàng tươi nguyên bản, không bị cam */
            border-radius: 0px; /* Góc vuông */
        }

        /* Hiệu ứng chạy thanh vàng trong 4 giây (bạn có thể chỉnh lại thời gian chạy nếu muốn) */
        .start-loading {
            animation: fillProgress 4s linear forwards;
        }

        @keyframes fillProgress {
            to { width: 100%; }
        }

        .loading-status {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 14px;
        }

        /* 6 ô vuông chạy qua lại */
        .squares {
            display: flex;
            gap: 4px;
        }
        
        .sq {
            width: 8px;
            height: 8px;
            background: #333333;
            border-radius: 0px; /* Ô vuông góc vuông */
            animation: blink 1.2s infinite ease-in-out;
        }
        
        /* Độ trễ tạo hiệu ứng lướt sóng qua lại */
        .sq:nth-child(1) { animation-delay: 0.0s; }
        .sq:nth-child(2) { animation-delay: 0.15s; }
        .sq:nth-child(3) { animation-delay: 0.3s; }
        .sq:nth-child(4) { animation-delay: 0.45s; }
        .sq:nth-child(5) { animation-delay: 0.6s; }
        .sq:nth-child(6) { animation-delay: 0.75s; }

        @keyframes blink {
            0%, 100% { background: #333333; }
            50% { background: #ffffff; }
        }
    </style>
</head>
<body>

    <img id="ponosImage" src="maxresdefault.jpg" alt="Ponos">

    <div id="loadingWrapper">
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="fillBar"></div>
        </div>
        <div class="loading-status">
            <span>Loading</span>
            <div class="squares">
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
                <div class="sq"></div><div class="sq"></div><div class="sq"></div>
            </div>
        </div>
    </div>
<script>
const ponosImg = document.getElementById('ponosImage');
const loadingBox = document.getElementById('loadingWrapper');
const fillBar = document.getElementById('fillBar');

// Sau 6 giây hiện loading
setTimeout(() => {

    // Ẩn ảnh Ponos
    ponosImg.style.display = 'none';

    // Hiện giao diện Loading
    loadingBox.style.display = 'flex';

    // Bắt đầu animation của thanh vàng
    fillBar.classList.add('start-loading');

    // Đợi thanh vàng chạy hết (4 giây)
    setTimeout(() => {
        window.location.href = "lobby.html";
    }, 4000);

}, 6000);
</script>
</body>
</html>
