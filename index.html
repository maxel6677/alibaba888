<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web tự động ẩn ảnh</title>
    <style>
        /* Giao diện nền đen toàn màn hình */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Định dạng ảnh căn chính giữa màn hình */
        #myImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.5s ease; /* Hiệu ứng mờ dần khi ẩn (nếu muốn) */
        }
    </style>
</head>
<body>

    <img id="myImage" src="maxresdefault.jpg" alt="Ponos Logo">

    <script>
        // Chờ trang web tải xong là đếm ngược ngay
        window.addEventListener('DOMContentLoaded', () => {
            const img = document.getElementById('myImage');
            
            // Sau 6 giây (6000 miligiây), ảnh sẽ biến mất
            setTimeout(() => {
                img.style.display = 'none'; 
            }, 6000);
        });
    </script>

</body>
</html>
